<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>محلل عقود العقارات — تسجيل الدخول</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
    background: #f4f6fb;
    direction: rtl;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .wrapper { width: 100%; max-width: 420px; }

  .header { text-align: center; margin-bottom: 28px; }
  .logo {
    width: 60px; height: 60px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
    margin: 0 auto 14px;
    box-shadow: 0 8px 20px rgba(102,126,234,0.35);
  }
  .header h1 { font-size: 24px; font-weight: 800; color: #2d3748; margin-bottom: 6px; }
  .header p { color: #718096; font-size: 14px; }

  .card {
    background: #fff;
    border-radius: 20px;
    padding: 32px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  }

  /* Tabs */
  .tabs {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px;
    background: #f4f6fb;
    border-radius: 10px;
    padding: 4px;
    margin-bottom: 28px;
  }
  .tab {
    padding: 10px;
    text-align: center;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    color: #718096;
    transition: all 0.2s;
    border: none;
    background: none;
    font-family: inherit;
  }
  .tab.active { background: #fff; color: #667eea; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }

  /* Forms */
  .form { display: none; }
  .form.active { display: block; }

  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 13px; font-weight: 600; color: #4a5568; margin-bottom: 6px; }
  .field input {
    width: 100%;
    padding: 12px 14px;
    border: 1.5px solid #e2e8f0;
    border-radius: 10px;
    font-size: 14px;
    color: #2d3748;
    transition: all 0.2s;
    font-family: inherit;
    background: #f7fafc;
  }
  .field input:focus { outline: none; border-color: #667eea; background: #fff; box-shadow: 0 0 0 3px rgba(102,126,234,0.1); }
  .field input::placeholder { color: #a0aec0; }
  .field input[type="email"], .field input[type="password"] { direction: ltr; text-align: right; }

  .btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 8px;
    transition: all 0.2s;
    font-family: inherit;
    box-shadow: 0 4px 14px rgba(102,126,234,0.35);
  }
  .btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .error-msg {
    background: #fff5f5;
    border: 1px solid #feb2b2;
    border-radius: 8px;
    padding: 10px 14px;
    color: #c53030;
    font-size: 13px;
    margin-bottom: 16px;
    display: none;
  }
  .success-msg {
    background: #f0fff4;
    border: 1px solid #9ae6b4;
    border-radius: 8px;
    padding: 10px 14px;
    color: #276749;
    font-size: 13px;
    margin-bottom: 16px;
    display: none;
  }

  .divider { text-align: center; color: #a0aec0; font-size: 12px; margin: 20px 0; position: relative; }
  .divider::before, .divider::after { content: ''; position: absolute; top: 50%; width: 42%; height: 1px; background: #e2e8f0; }
  .divider::before { right: 0; }
  .divider::after { left: 0; }

  .trial-note {
    text-align: center;
    font-size: 12px;
    color: #718096;
    margin-top: 20px;
  }
  .trial-note span { color: #667eea; font-weight: 700; }
</style>
</head>
<body>
<div class="wrapper">
  <div class="header">
    <div class="logo">🏠</div>
    <h1>محلل عقود العقارات</h1>
    <p>حلل عقدك واعرف حقوقك في ثواني</p>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">تسجيل الدخول</button>
      <button class="tab" onclick="switchTab('signup')">حساب جديد</button>
    </div>

    <!-- Login -->
    <div class="form active" id="loginForm">
      <div class="error-msg" id="loginError"></div>
      <div class="field">
        <label>البريد الإلكتروني</label>
        <input type="email" id="loginEmail" placeholder="example@email.com" />
      </div>
      <div class="field">
        <label>كلمة المرور</label>
        <input type="password" id="loginPassword" placeholder="••••••••" />
      </div>
      <button class="btn" id="loginBtn" onclick="login()">دخول</button>
    </div>

    <!-- Signup -->
    <div class="form" id="signupForm">
      <div class="error-msg" id="signupError"></div>
      <div class="success-msg" id="signupSuccess"></div>
      <div class="field">
        <label>الاسم الكامل</label>
        <input type="text" id="signupName" placeholder="محمد أحمد" />
      </div>
      <div class="field">
        <label>رقم الموبايل</label>
        <input type="tel" id="signupPhone" placeholder="01xxxxxxxxx" />
      </div>
      <div class="field">
        <label>البريد الإلكتروني</label>
        <input type="email" id="signupEmail" placeholder="example@email.com" />
      </div>
      <div class="field">
        <label>كلمة المرور</label>
        <input type="password" id="signupPassword" placeholder="8 أحرف على الأقل" />
      </div>
      <button class="btn" id="signupBtn" onclick="signup()">إنشاء الحساب</button>
    </div>

    <div class="trial-note">
      🎁 كل حساب جديد يحصل على <span>3 عقود مجانية</span> للتجربة
    </div>
  </div>
</div>

<script>
  // Redirect if already logged in
  if (localStorage.getItem('auth_token')) {
    window.location.href = '/app';
  }

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'signup'));
    });
    document.getElementById('loginForm').classList.toggle('active', tab === 'login');
    document.getElementById('signupForm').classList.toggle('active', tab === 'signup');
  }

  function showError(id, msg) {
    const el = document.getElementById(id);
    el.textContent = '⚠️ ' + msg;
    el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 5000);
  }

  async function login() {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    if (!email || !password) return showError('loginError', 'ادخل الإيميل وكلمة المرور');

    const btn = document.getElementById('loginBtn');
    btn.disabled = true; btn.textContent = 'جاري الدخول...';

    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);

      localStorage.setItem('auth_token', data.token);
      localStorage.setItem('user_data', JSON.stringify(data.user));
      window.location.href = '/app';
    } catch (err) {
      showError('loginError', err.message);
      btn.disabled = false; btn.textContent = 'دخول';
    }
  }

  async function signup() {
    const name = document.getElementById('signupName').value.trim();
    const phone = document.getElementById('signupPhone').value.trim();
    const email = document.getElementById('signupEmail').value.trim();
    const password = document.getElementById('signupPassword').value;

    if (!name || !phone || !email || !password)
      return showError('signupError', 'كل الحقول مطلوبة');
    if (password.length < 8)
      return showError('signupError', 'كلمة المرور لازم تكون 8 أحرف على الأقل');

    const btn = document.getElementById('signupBtn');
    btn.disabled = true; btn.textContent = 'جاري الإنشاء...';

    try {
      const res = await fetch('/api/signup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, phone, email, password })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);

      localStorage.setItem('auth_token', data.token);
      localStorage.setItem('user_data', JSON.stringify(data.user));
      window.location.href = '/app';
    } catch (err) {
      showError('signupError', err.message);
      btn.disabled = false; btn.textContent = 'إنشاء الحساب';
    }
  }

  // Enter key support
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      if (document.getElementById('loginForm').classList.contains('active')) login();
      else signup();
    }
  });
</script>
</body>
</html>
